<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ht{
            text-align: center;
            color: cadetblue;
            font-family: 幼圆;
        }
        .tab{
            width: 500px;
            border: 5px solid cadetblue;
            margin: 0px auto;
            border-radius: 5px;
            font-family: 幼圆;
        }
        .ltr td{
            border: 1px solid powderblue;
        }
        .ipt{
            border: 0px;
            width: 50%;
        }
        .btn1{
            border: 2px solid powderblue;
            border-radius: 4px;
            width: 60px;
            background-color: antiquewhite;
        }
        #usernameMsg,#userPwdMsg,#reuserPwdMsg{
            color: rgb(255, 136, 0);
        }
        .buttonContainer{
            text-align: center;
        }
    </style>

    <script>
        function checkUsername(){
            var usernameReg = /^[a-zA-Z0-9]{5,10}$/
            var usernameInput = document.getElementById("usernameInput")
            var username = usernameInput.value
            var usernameMsg = document.getElementById("usernameMsg")
            if(!usernameReg.test(username)){
                usernameMsg.innerText="用户名格式有误"
                return false
            }
            //格式正确通过之后继续校验用户名是否被占用
            var request = new XMLHttpRequest();
            //设置回调函数
            request.onreadystatechange = function (){
                if(request.readyState==4 && request.status==200){
                    var result = JSON.parse(request.responseText)
                    if(result.code != 200){
                        usernameMsg.innerText = "不可用"
                    }else{
                        usernameMsg.innerText = "OK"
                    }
                }
            }
            //设置请求方式和请求的资源路径
            request.open("GET","/user/chekUsernameUsed?username="+username);
            //发生请求
            request.send();

            /*usernameMsg.innerText="OK"
            return true*/
        }
        function checkUserPwd(){
            var userPwdReg = /^\d{6}$/
            var userPwdInput = document.getElementById("userPwdInput")
            var userPwd = userPwdInput.value
            var userPwdMsg = document.getElementById("userPwdMsg")
            if(!userPwdReg.test(userPwd)){
                userPwdMsg.innerText="密码格式有误"
                return false
            }
            userPwdMsg.innerText="OK"
            return true
        }
        function checkReUserPwd(){
            var userPwdReg = /^\d{6}$/

            var reuserPwdInput = document.getElementById("reuserPwdInput")
            var reuserPwd = reuserPwdInput.value
            var reuserPwdMsg = document.getElementById("reuserPwdMsg")

            var userPwdInput = document.getElementById("userPwdInput")
            var userPwd = userPwdInput.value

            if(reuserPwd != userPwd){
                reuserPwdMsg.innerText="两次密码不一致"
                return false
            }
            reuserPwdMsg.innerText="OK"
            return true
        }
        function checkForm(){
            var flag1 = checkUsername()
            var flag2 = checkUserPwd()
            var flag3 = checkReUserPwd()
            return flag1 && flag2 && flag3
        }
    </script>

</head>
<body>
    <h1 class="ht">欢迎使用日常管理系统</h1>
    <h3 class="ht">请注册</h3>
    <form method="post" action="/user/regist" onsubmit="return checkForm()">
        <table class="tab" cellspacing="0px">
            <tr class="ltr">
                <td>请输入账号</td>
                <td>
                    <input class="ipt" type="text" name="username" id="usernameInput" onblur="checkUsername()">
                    <span id="usernameMsg" class="msg"></span>
                </td>
            </tr>
            <tr class="ltr">
                <td>请输入密码</td>
                <td>
                    <input class="ipt" type="password" name="userPwd" id="userPwdInput" onblur="checkUserPwd()">
                    <span id="userPwdMsg" class="msg"></span>
                </td>
            </tr>
            <tr class="ltr">
                <td>请确认密码</td>
                <td>
                    <input class="ipt" type="password" name="reuserPwd" id="reuserPwdInput" onblur="checkReUserPwd()">
                    <span id="reuserPwdMsg" class="msg"></span>
                </td>
            </tr>
            <tr class="ltr">
                <td colspan="2" class="buttonContainer">
                    <input class="btn1" type="submit" value="注册">
                    <input class="btn1" type="reset" value="重置">
                    <button class="btn1"><a href="/login.html">去登陆</a></button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
