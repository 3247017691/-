<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ht{
            text-align: center;
            color: cadetblue;
            font-family: 幼圆;
        }
        .tab{
            width: 500px;
            border: 5px solid cadetblue;
            margin: 0px auto;
            border-radius: 5px;
            font-family: 幼圆;
        }
        .ltr td{
            border: 1px solid powderblue;
        }
        .ipt{
            border: 0px;
            width: 50%;
        }
        .btn1{
            border: 2px solid powderblue;
            border-radius: 4px;
            width: 60px;
            background-color: antiquewhite;
        }
        #usernameMsg,#userPwdMsg{
            color: rgb(255, 136, 0);
        }
        .buttonContainer{
            text-align: center;
        }
    </style>

    <script>
        //校验用户格式是否合法的函数
        function checkUsername(){
            //定义正则表示字符串的规则
            var usernameReg = /^[a-zA-z0-9]{5,10}$/
            //获得用户页面上输入的信息
            var usernameInput = document.getElementById("usernameInput")
            var username = usernameInput.value
            //获得格式提示框
            var usernameMsg = document.getElementById("usernameMsg")
            //用户名有误时，返回false，在页面上提示
            if(!usernameReg.test(username)){
                usernameMsg.innerText="用户名格式有误"
                return false
            }
            //格式OK，返回true 在页面上提示OK
            usernameMsg.innerText="OK"
            return true
        }
        //校验密码格式是否合法的函数
        function checkUserPwd(){
            //定义正则表示字符串的规则
            var userPwdReg = /^[0-9]{6}$/
            //获得用户页面上输入的信息
            var userPwdInput = document.getElementById("userPwdInput")
            var userPwd = userPwdInput.value
            //获得格式提示框
            var userPwdMsg = document.getElementById("userPwdMsg")
            //用户名有误时，返回false，在页面上提示
            if(!userPwdReg.test(userPwd)){
                userPwdMsg.innerText="密码格式有误"
                return false
            }
            //格式OK，返回true 在页面上提示OK
            userPwdMsg.innerText="OK"
            return true
        }
        //表单提交时校验用户名格式和密码格式，格式OK时才会提交
        function checkForm(){
            var flag1 = checkUsername()
            var flag2 = checkUserPwd()
            return flag1&&flag2
        }
    </script>

</head>
<body>
    <h1 class="ht">欢迎使用日常管理系统</h1>
    <h3 class="ht">请登录</h3>
    <form method="post" action="/user/login" onsubmit="return checkForm()">
        <table class="tab" cellspacing="0px">
            <tr class="ltr">
                <td>请输入账号</td>
                <td>
                    <input class="ipt" type="text" name="username" id="usernameInput" onblur="checkUsername()">
                    <span id="usernameMsg"></span>
                </td>
            </tr>
            <tr class="ltr">
                <td>请输入密码</td>
                <td>
                    <input class="ipt" type="password" name="userPwd" id="userPwdInput" onblur="checkUserPwd()">
                    <span id="userPwdMsg"></span>
                </td>
            </tr>
            <tr class="ltr">
                <td colspan="2" class="buttonContainer">
                    <input class="btn1" type="submit" value="登陆">
                    <input class="btn1" type="reset" value="重置">
                    <button class="btn1"><a href="/regist.html">去注册</a></button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
